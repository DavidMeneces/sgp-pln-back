#------------------ APP CONFIG --------------------#
spring.application.name=mealplans-api

#------------------SERVER CONFIG-------------------#
#------------------service base--------------------#
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.whitelabel.enabled=true
#------------------service pool thread-------------#
spring.thread-pool.queue-size=2250
spring.thread-pool.max-threads=50
spring.thread-pool.core-threads=10
#------------------service pool thread-------------#
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://154.38.180.80:8080/realms/group3realm}

#------------------DOCUMENTATION CONFIG-------------#
#------------------swagger config-------------------#
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger.path-location=/
#springdoc.swagger.path-location=/sgp-pln-back/
springdoc.swagger-ui.configUrl=${springdoc.swagger.path-location}v3/api-docs/swagger-config
springdoc.swagger-ui.url=${springdoc.swagger.path-location}v3/api-docs
springdoc.swagger-ui.path=/apidoc/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

#------------------DATABASE CONFIG------------------#
#------------------database connection config---------#
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/sgppln}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
#spring.jpa.generate-ddl=true
#spring.jpa.hibernate.ddl-auto=update

#------------------RABBITMQ CONFIG------------------#
#------------------event bus (outbox+rabbitmq)------#
eventbus.driver=${EVENTBUS_DRIVER:rabbitmq}
#------------------rabbitmq config conecction-------#
rabbitmq.host=${RABBITMQ_HOST:154.38.180.80}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USER:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:rabbit_mq}
rabbitmq.vhost=${RABBITMQ_VHOST:/}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:outbox.events}
rabbitmq.exchange-type=${RABBITMQ_EXCHANGE_TYPE:fanout}
rabbitmq.exchange-durable=${RABBITMQ_EXCHANGE_DURABLE:true}
rabbitmq.routing-key=${RABBITMQ_ROUTING_KEY:}
rabbitmq.queue=${RABBITMQ_QUEUE:}
rabbitmq.queue-durable=${RABBITMQ_QUEUE_DURABLE:true}
rabbitmq.queue-exclusive=${RABBITMQ_QUEUE_EXCLUSIVE:false}
rabbitmq.queue-auto-delete=${RABBITMQ_QUEUE_AUTO_DELETE:false}
rabbitmq.binding-key=${RABBITMQ_BINDING_KEY:}
rabbitmq.declare-topology=${RABBITMQ_DECLARE_TOPOLOGY:false}
rabbitmq.publish-retries=${RABBITMQ_PUBLISH_RETRIES:3}
rabbitmq.publish-backoff-ms=${RABBITMQ_PUBLISH_BACKOFF_MS:250}
rabbitmq.connect-timeout-seconds=${RABBITMQ_CONNECT_TIMEOUT:5}
rabbitmq.read-write-timeout-seconds=${RABBITMQ_READ_WRITE_TIMEOUT:5}
rabbitmq.outbox-batch-size=${RABBITMQ_OUTBOX_BATCH_SIZE:50}
rabbitmq.outbox-poll-interval-ms=${RABBITMQ_OUTBOX_POLL_INTERVAL_MS:1000}
#------------------inbound suscription config-------#
inbound.rabbitmq.enabled=${INBOUND_RABBITMQ_ENABLED:true}
inbound.rabbitmq.exchange=${INBOUND_RABBITMQ_EXCHANGE:outbox.events}
inbound.rabbitmq.exchange-type=${INBOUND_RABBITMQ_EXCHANGE_TYPE:fanout}
inbound.rabbitmq.exchange-durable=${INBOUND_RABBITMQ_EXCHANGE_DURABLE:true}
inbound.rabbitmq.queue=${INBOUND_RABBITMQ_QUEUE:planes.inbound}
inbound.rabbitmq.queue-durable=${INBOUND_RABBITMQ_QUEUE_DURABLE:true}
inbound.rabbitmq.queue-exclusive=${INBOUND_RABBITMQ_QUEUE_EXCLUSIVE:false}
inbound.rabbitmq.queue-auto-delete=${INBOUND_RABBITMQ_QUEUE_AUTO_DELETE:false}
inbound.rabbitmq.declare-topology=${INBOUND_RABBITMQ_DECLARE_TOPOLOGY:false}
inbound.rabbitmq.fail-fast-on-missing-queue=${INBOUND_RABBITMQ_FAIL_FAST_ON_MISSING_QUEUE:false}
inbound.rabbitmq.schema-versions=${INBOUND_SCHEMA_VERSIONS:1}
inbound.rabbitmq.routing-keys=${INBOUND_RABBITMQ_ROUTING_KEYS:paciente.paciente-creado}

#------------------METRICS CONFIG------------------#
#------------------actuator & prometheus metrics---#
management.endpoints.web.exposure.include=*
management.endpoints.access.default=unrestricted
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

#------------------SERVICE-DISCOVERY CONFIG------------------#
consul.enabled=${CONSUL_ENABLED:true}
consul.host=${CONSUL_HOST:154.38.180.80}
consul.port=${CONSUL_PORT:8500}
consul.scheme=${CONSUL_SCHEME:http}
consul.service-id=${SERVICE_ID:nur-tricenter-mealplans}
consul.service-name=${SERVICE_NAME:nur-tricenter-mealplans}
consul.service-address=${SERVICE_ADDRESS:142.93.120.239}
consul.service-port=${SERVICE_PORT:8081}
consul.health-check-path=${HEALTH_CHECK_PATH:/actuator/health}
consul.health-check-interval=${HEALTH_CHECK_INTERVAL:15s}
consul.health-check-timeout=${HEALTH_CHECK_TIMEOUT:5s}
consul.deregister-critical-after=${CONSUL_DEREGISTER_AFTER:1m}
